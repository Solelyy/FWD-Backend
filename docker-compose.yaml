version: '1'

services:
  app:
    container_name: 'fwd-backend'
    restart: unless-stopped
    build:
      context: .
      dockerfile: dockerfile
    environment:
      PORT: ${PORT}
      POSTGRES_HOST: postgres_db # localhost doesn't work in docker container, hence you should use postgres container name instead of localhost
      REDIS_HOST: redis # the same for redis. Use redis container name instead of localhost
    ports:
      - ${PORT}:${PORT}
    depends_on:
      - postgres_db
      - redis
    networks:
      myapp_net:

  postgres_db:
    image: bitnami/postgresql:15
    container_name: 'myapp_postgres_db'
    restart: unless-stopped
    environment:
      POSTGRESQL_USERNAME: ${POSTGRE-USER}
      POSTGRESQL_PASSWORD: ${POSTGRE-PASS}
      POSTGRESQL_DATABASE: ${POSTGRE-DB}
      POSTGRESQL_TIMEZONE: 'Asia/Manila'
    ports:
      - ${POSTGRE-PORT}:5432
    volumes:
      - 'postgres_data:/bitnami/postgresql'
    networks:
      myapp_net:
  redis:
    image: 'bitnami/redis:7.2'
    container_name: 'myapp_redis'
    restart: unless-stopped
    ports:
      - ${REDIS_PORT}:${REDIS_PORT}
    volumes:
      - 'redis_data:/bitnami/redis/data'
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_PORT: ${REDIS_PORT}
      REDIS_DB: ${REDIS_DB}
      REDIS_IO_THREADS: 4
      REDIS_IO_THREADS_DO_READS: yes
      REDIS_DISABLE_COMMANDS: FLUSHDB,FLUSHALL
    networks:
      myapp_net:

volumes:
  postgres_data:
  redis_data:

networks:
  myapp_net:
